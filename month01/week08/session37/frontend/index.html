    <header>
        <div class="card">
            <button class="theme-btn" data-theme="light"> Toggle light</button>
        </div>
        <div class="card">
             <button class="theme-btn" data-theme="dark"> Toggle Dark</button>
        </div>
        <div class="card">
             <button class="theme-btn" data-theme="ocean"> Toggle Ocean</button>
        </div>

    </header>
    <footer></footer>
    <script>
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.documentElement.setAttribute('data-theme', btn.dataset.theme);
    });
});</script>
