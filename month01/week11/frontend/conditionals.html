<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JS Conditionals</h1>
    <main>
        <h2>Logical Operators</h2>
        <form action="" id="election">
            <input type="number" id="age">
            <input type="text" id="citizenship">
            <button type="submit">Check Eligibility for Election</button>
        </form>
        <div class="election-display"></div>

        <h2> JS Switch</h2>
        <select name="seasons" id="seasons">
            <option value="winter">Winter</option>
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="autumn">Autumn</option>
        </select>
        <div id="season-display"></div>
    </main>

    <script src="./js/conditionals.js"></script>
</body>
</html>
