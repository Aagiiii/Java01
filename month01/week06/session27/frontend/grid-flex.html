<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid & flex</title>
    <link rel="stylesheet" href="./css/grid-flex.css">
</head>

<body>
    <!--Level 2.1: Responsive Flexbox (flex-wrap) -->
    <div class="cards">
        <div class="card">
            <h3>Card 1</h3>
            <p>Flexible card</p>
        </div>
        <div class="card">
            <h3>Card 2</h3>
            <p>Flexible card</p>
        </div>
        <div class="card">
            <h3>Card 3</h3>
            <p>Flexible card</p>
        </div>
        <div class="card">
            <h3>Card 4</h3>
            <p>Flexible card</p>
        </div>
    </div>

    <!-- Level 2.2: Order Property (Reordering) -->

    <header class="header">
        <div class="logo">
            Logo
        </div>
        <div class="menu">
            <span>Home</span>
            <span>About</span>
            <span>Contact</span>
        </div>
        <div class="search">
            <input type="text" placeholder="Search ...">
        </div>
    </header>
    <!-- Level 2.3: Grid Item Placement (span) -->
    <div class="gallery">
        <div class="photo">1</div>
        <div class="photo">2</div>
        <div class="photo featured">3 (Featured 2x2)</div>
        <div class="photo">4</div>
        <div class="photo">5</div>
        <div class="photo">6</div>
        <div class="photo">7</div>
    </div>
    <!-- ## **Level 2.4: Grid Template Areas (Complete Layout)** -->

    <div class="page2">
        <div class="header2">Header</div>
        <aside class="sidebar2">
            Sidebar
        </aside>
        <main class="content2">
            Main Content
        </main>
        <footer class="footer">
            Footer
        </footer>
    </div>
</body>

</html>
